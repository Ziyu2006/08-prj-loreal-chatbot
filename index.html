<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Beauty Advisor</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!-- Header / Branding -->
      <header class="site-header">
        <div class="brand-wrap">
          <img
            src="loreal-logo.png"
            alt="L’Oréal logo"
            class="brand-logo"
          />
          <div>
            <h1 class="site-title">L’Oréal Beauty Advisor</h1>
            <p class="site-subtitle">
              Discover products, routines, and personalized beauty recommendations
            </p>
          </div>
        </div>
      </header>

      <!-- Chat Area -->
      <main>
        <section class="chatbox">
          <div id="currentQuestion" class="current-question"></div>

          <div id="chatWindow" class="chat-window">
            <div class="message assistant-message">
              Hi! I’m your L’Oréal Beauty Advisor. Ask me about skincare, makeup,
              haircare, fragrances, or building a routine.
            </div>
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about products, routines, skincare, makeup..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!-- Footer -->
      <footer class="site-footer">
        <p>&copy; 2026 L’Oréal Beauty Advisor. Student project.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- Remove secrets.js after switching to Cloudflare Worker -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
