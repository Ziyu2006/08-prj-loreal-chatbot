<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>L’Oréal Beauty Advisor | AI Skincare & Makeup Assistant</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="brand-wrap">
          <img
            src="loreal-logo.png"
            alt="L’Oréal Paris logo"
            class="brand-logo"
            onerror="this.src='https://placehold.co/90x90?text=LOreal';"
          />
          <div>
            <h1 class="site-title">L’Oréal Beauty Advisor</h1>
            <p class="site-subtitle">
              ✨ AI-powered skincare · makeup · haircare · fragrance ✨
            </p>
          </div>
        </div>
      </header>

      <main>
        <section class="chatbox">
          <div id="currentQuestion" class="current-question"></div>

          <div id="chatWindow" class="chat-window">
            <!-- messages appear here -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Ask about L’Oréal products</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="e.g., Best serum for dry skin? Or build my routine..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>© 2026 L’Oréal Beauty Advisor — AI demo for educational showcase</p>
        <nav>
          <a href="#">Beauty Code of Ethics</a>
          <a href="#">Privacy</a>
          <a href="#">L’Oréal Group</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
